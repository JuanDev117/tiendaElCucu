<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cucu - Registro</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/tienda/style.css">
    <link rel="stylesheet" href="/login/login.css"> <!-- Reusamos los mismos estilos premium -->
</head>
<body>
    <div class="login-container">
        <!-- Resplandor de fondo estilo Vercel -->
        <div class="login-glow"></div>
        
        <div class="login-card">
            <div class="login-header">
                <a href="/" class="logo-link">
                    <span class="logo-text">Tienda el cucu<span class="dot">.</span></span>
                </a>
                <h1>Crea tu cuenta</h1>
                <p>Únete para poder comprar nuestros productos</p>
            </div>
            
            <form id="registerForm" class="login-form">
                <div class="input-group">
                    <label for="name">Nombre Completo</label>
                    <input type="text" id="name" placeholder="Juan Pérez" required>
                </div>
                <div class="input-group">
                    <label for="email">Correo Electrónico</label>
                    <input type="email" id="email" placeholder="tu@email.com" required>
                </div>
                <div class="input-group">
                    <label for="password">Contraseña</label>
                    <input type="password" id="password" placeholder="••••••••" required minlength="6">
                </div>
                
                <button type="submit" class="btn btn-primary login-btn">Registrarse</button>
            </form>
            <div id="error" style="color: #ef4444; font-size: 0.875rem; text-align: center; margin-top: 1rem;"></div>
            <div id="success" style="color: var(--green-primary); font-size: 0.875rem; text-align: center; margin-top: 0.5rem;"></div>
            
            <div class="login-footer">
                <p>¿Ya tienes una cuenta? <a href="/login">Inicia Sesión</a></p>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="/supabase-config.js"></script>
    <script src="/login/registro.js"></script>
</body>
</html>
