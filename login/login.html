<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cucu - Iniciar Sesión</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../tienda/style.css"> <!-- Base y variables -->
    <link rel="stylesheet" href="login.css"> <!-- Estilos propios del login -->
</head>
<body>
    <div class="login-container">
        <!-- Resplandor de fondo estilo Vercel -->
        <div class="login-glow"></div>
        
        <div class="login-card">
            <div class="login-header">
                <a href="../tienda/index.html" class="logo-link">
                    <span class="logo-text">Tienda el cucu<span class="dot">.</span></span>
                </a>
                <h1>Bienvenido de nuevo</h1>
                <p>Ingresa a tu cuenta para continuar</p>
            </div>
            
            <form id="loginForm" class="login-form">
                <div class="input-group">
                    <label for="email">Correo Electrónico</label>
                    <input type="email" id="email" placeholder="tu@email.com" required>
                </div>
                <div class="input-group">
                    <div class="password-label-group">
                        <label for="password">Contraseña</label>
                        <a href="#" class="forgot-password">¿Olvidaste tu contraseña?</a>
                    </div>
                    <input type="password" id="password" placeholder="••••••••" required>
                </div>
                
                <button type="submit" class="btn btn-primary login-btn">Iniciar Sesión</button>
            </form>
            
            <div class="login-footer">
                <p>¿No tienes una cuenta? <a href="#">Regístrate</a></p>
            </div>
        </div>
    </div>

    <div id="error" style="color: #ef4444; font-size: 0.875rem; text-align: center; margin-top: 1rem;"></div>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../supabase-config.js"></script>
    <script src="login.js"></script>
</body>
</html>
